<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- These tags are populated at runtime from site-config.js (seo section) -->
  <title>Loading…</title>
  <meta name="description" id="meta-description" content="" />
  <meta name="keywords" id="meta-keywords" content="" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-description" content="" />
  <meta property="og:image" id="og-image" content="" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_IN" />
  <script type="application/ld+json" id="ld-json">{}</script>

  <!-- Bootstrap 5 + Icons (loaded from CDN; work offline once cached) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Default fonts (app.js will load the fonts chosen in site-config.js too) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link id="font-link" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Site styles -->
  <link href="styles.css" rel="stylesheet" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
    <div class="container">
      <a class="brand-logo" href="#home" id="navBrand"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center" id="navLinks"></ul>
      </div>
    </div>
  </nav>

  <!-- ============ HERO ============ -->
  <header class="hero" id="home">
    <img class="hero-bg-img" id="heroBgImg" alt="" hidden />
    <canvas id="network-canvas"></canvas>
    <div class="hero-grid"></div>
    <div class="container hero-content" id="heroContent"></div>
    <div class="scroll-cue"><div class="mouse"></div>Scroll</div>
  </header>

  <!-- ============ ABOUT ============ -->
  <section class="section" id="about"><div class="container" id="aboutContainer"></div></section>

  <!-- ============ SERVICES ============ -->
  <section class="section bg-light-section" id="services"><div class="container" id="servicesContainer"></div></section>

  <!-- ============ SOLUTIONS ============ -->
  <section class="section" id="solutions"><div class="container" id="solutionsContainer"></div></section>

  <!-- ============ WHY CHOOSE ============ -->
  <section class="section bg-dark-section" id="why"><div class="container" id="whyContainer"></div></section>

  <!-- ============ INDUSTRIES ============ -->
  <section class="section" id="industries"><div class="container" id="industriesContainer"></div></section>

  <!-- ============ PROJECTS ============ -->
  <section class="section bg-light-section" id="projects"><div class="container" id="projectsContainer"></div></section>

  <!-- ============ PARTNERS / CLIENTS ============ -->
  <section class="section-tight" id="clients"><div id="partnersContainer"></div></section>

  <!-- ============ TESTIMONIALS ============ -->
  <section class="section bg-testi" id="testimonials"><div class="container" id="testimonialsContainer"></div></section>

  <!-- ============ CONTACT ============ -->
  <section class="section bg-light-section" id="contact"><div class="container" id="contactContainer"></div></section>

  <!-- ============ FOOTER ============ -->
  <footer><div class="container" id="footerContainer"></div></footer>

  <!-- ============ THEME CUSTOMIZER (injected by app.js) ============ -->
  <!-- <div id="themeCustomizer"></div> -->

  <!-- ============ SCRIPTS ============ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="site-config.js"></script>
  <script src="app.js"></script>
  <script src="editor.js"></script>
</body>
</html>
